site_name: NMCB Hand-over Documentation
site_description: Operational, data management, and data engineering hand-over for NMCB
site_url: https://nmcb-fair.github.io/nmcb-handover-docs/
repo_name: nmcb-handover

theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_javascript:
  - javascripts/site-assets.js
  - javascripts/mermaid-config.js
  - javascripts/goatcounter-env.js
  - javascripts/goatcounter.js
  - javascripts/pageview-badge.js
  - javascripts/pageviews-chart.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true

nav:
  - Data flow (home): index.md
  - Where data lives: where-data-lives.md
  - Site usage: site-usage.md
  - Workflows:
      - Overview: workflows/index.md
      - CDL alert workflow: workflows/cdl-alert-workflow.md
      - RDL alert workflow: workflows/rdl-alert-workflow.md
      - Multi-centre sample data workflow: workflows/multicentre-sample-data-workflow.md
      - Biosample request workflow: workflows/sample-request-workflow.md
      - Device data workflow: workflows/device-data-workflow.md
      - Device setup for visit: workflows/device-setup-for-visit.md
      - Recurring study routines: workflows/recurring-routines.md
  - Systems:
      - Data architecture: systems/data-architecture.md
      - Castor EDC: systems/castor.md
      - Devices: systems/devices.md
      - Snowflake and structured data: systems/snowflake.md
      - Research Drive: systems/research-drive.md
      - Biobank: systems/biobank.md
      - OpenSpecimen: systems/openspecimen.md
      - myDRE: systems/mydre.md
      - LDOT: systems/ldot.md
      - NMCB Core distribution list: systems/distributed-list.md
      - GitHub: systems/github.md
  - FAIR:
      - Overview: fair/index.md
      - FAIRification: fair/fairification.md
      - FAIR Implementation Profile: fair/fair-implementation-profile.md
      - PAIS metadata schema: fair/pais-metadata-schema.md
      - FAIR Data Point: fair/fair-data-point.md
      - Health-RI metadata: fair/health-ri-metadata.md
      - Controlled vocabulary: fair/controlled-vocabulary.md
      - Ontology harmonization: fair/ontology-harmonization.md
      - OMOP CDM mapping: fair/omop-mapping.md
  - Tasks:
      - Data request: tasks/data-request.md
      - Sample request: tasks/sample-request.md
      - Withdrawal SOP: tasks/sop-withdrawal.md
      - Device data transfer SOP: tasks/sop-data-transfer.md
      - NMCB ChatGPT: tasks/nmcb-chatgpt.md
      - Improve VU-AMS: tasks/improve-vu-ams.md
      - ACS data clean: tasks/acs-data-clean.md
      - Patient resume: tasks/patient-resume.md
      - Data management plan: tasks/data-management-plan.md
      - Update NMCB codebook: tasks/update-nmcb-codebook.md
      - NMCB numbers overview: tasks/number-overview.md
